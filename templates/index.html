<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF AI Chat</title>
<style>
:root {
  --bg-primary: #0a0e1a;
  --bg-secondary: #111827;
  --bg-tertiary: #1a1f2e;
  --bg-gradient: radial-gradient(ellipse at top, #1a1f2e 0%, #0a0e1a 70%);
  --border-light: rgba(148, 163, 184, 0.2);
  --border-medium: rgba(148, 163, 184, 0.3);
  --text-primary: #f8fafc;
  --text-secondary: #cbd5e1;
  --text-muted: #94a3b8;
  --accent-blue: #3b82f6;
  --accent-purple: #8b5cf6;
  --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #ec4899 100%);
  --glass-bg: rgba(255, 255, 255, 0.05);
  --glass-border: rgba(255, 255, 255, 0.1);
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3);
  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.4);
  --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.5);
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

body {
  height: 100vh; background: var(--bg-gradient); color: var(--text-primary); overflow: hidden;
}

.header {
  height: 60px; background: rgba(17, 24, 39, 0.9); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-light); display: flex; align-items: center;
  padding: 0 24px; position: sticky; top: 0; z-index: 100;
}

.logo {
  font-size: 20px; font-weight: 700; background: var(--accent-gradient);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

.main { display: flex; height: calc(100vh - 60px); }

.sidebar {
  width: 320px; background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(20px);
  border-right: 1px solid var(--border-light); display: flex; flex-direction: column;
}

.sidebar-header { padding: 24px; border-bottom: 1px solid var(--border-light); }
.sidebar-title { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 8px; }

.upload-area { padding: 24px; flex: 1; display: flex; flex-direction: column; }

.upload-zone {
  border: 2px dashed var(--border-medium); border-radius: 12px; padding: 32px; text-align: center;
  background: var(--glass-bg); cursor: pointer; transition: all 0.3s ease; margin-bottom: 16px;
  backdrop-filter: blur(10px);
}

.upload-zone:hover { border-color: var(--accent-blue); background: rgba(59, 130, 246, 0.1); box-shadow: var(--shadow-md); transform: translateY(-2px); }
.upload-zone.dragover { border-color: var(--accent-purple); background: rgba(139, 92, 246, 0.15); box-shadow: var(--shadow-lg); }

.upload-icon {
  width: 48px; height: 48px; margin: 0 auto 12px; background: var(--accent-gradient);
  border-radius: 12px; display: flex; align-items: center; justify-content: center;
  font-size: 20px; box-shadow: var(--shadow-sm);
}

.status { padding: 12px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; backdrop-filter: blur(10px); display: none; }
.status.success { background: rgba(34, 197, 94, 0.2); color: #10b981; border: 1px solid rgba(34, 197, 94, 0.3); }
.status.error { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }

.chat-container { flex: 1; display: flex; flex-direction: column; max-width: 1000px; margin: 0 auto; }

.chat-messages {
  flex: 1; overflow-y: auto; padding: 32px 40px 80px; display: flex; flex-direction: column; gap: 20px;
}

.chat-messages::-webkit-scrollbar { width: 6px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.3); border-radius: 3px; }
.chat-messages::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, 0.5); }

.message { display: flex; gap: 12px; max-width: 800px; animation: slideIn 0.4s ease; }
@keyframes slideIn { from { opacity: 0; transform: translateY(15px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

.message.user { margin-left: auto; flex-direction: row-reverse; }
.avatar {
  width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 14px; font-weight: 600; flex-shrink: 0;
}
.avatar.user { background: var(--accent-gradient); box-shadow: var(--shadow-sm); }
.avatar.bot { background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); box-shadow: var(--shadow-sm); }

.message-content {
  flex: 1; padding: 18px 22px; border-radius: 20px; line-height: 1.65; font-size: 15px;
  backdrop-filter: blur(10px); box-shadow: var(--shadow-md); max-width: calc(100% - 48px);
}
.message.user .message-content,
.message.bot .message-content {
  background: var(--glass-bg); border: 1px solid var(--glass-border);
  border-bottom-left-radius: 8px; border-bottom-right-radius: 8px;
}
.message.user .message-content { border-bottom-right-radius: 8px; }
.message.bot .message-content { border-bottom-left-radius: 8px; }

.input-container {
  padding: 24px 40px 40px; background: rgba(17, 24, 39, 0.6); backdrop-filter: blur(20px);
  border-top: 1px solid var(--border-light); position: relative;
}

.input-wrapper { max-width: 800px; margin: 0 auto; position: relative; }

.chat-input {
  width: 100%; padding: 18px 22px 18px 56px; border: 1px solid var(--border-medium);
  border-radius: 28px; font-size: 15px; outline: none; background: var(--glass-bg);
  color: var(--text-primary); backdrop-filter: blur(20px); transition: all 0.3s ease;
  resize: none; line-height: 1.55; min-height: 24px; max-height: 140px;
}
.chat-input:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2); }
.chat-input::placeholder { color: var(--text-muted); }

.send-btn {
  position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
  width: 40px; height: 40px; border: none; border-radius: 50%; background: var(--accent-gradient);
  color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
  opacity: 0.7; transition: all 0.3s ease; box-shadow: var(--shadow-sm);
}
.send-btn:hover:not(:disabled) { opacity: 1; transform: translateY(-50%) scale(1.08); box-shadow: var(--shadow-md); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: translateY(-50%) scale(0.95); }

.typing-indicator { display: flex; align-items: flex-start; gap: 12px; }
.typing-dots { display: flex; gap: 4px; margin-top: 4px; }
.typing-dots span {
  width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%;
  animation: typing 1.4s infinite ease-in-out;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing {
  0%, 60%, 100% { transform: scale(1); opacity: 0.4; }
  30% { transform: scale(1.3); opacity: 1; }
}

@media (max-width: 768px) {
  .sidebar { position: fixed; inset: 0; z-index: 200; transform: translateX(-100%); transition: transform 0.3s ease; }
  .sidebar.open { transform: translateX(0); }
  .chat-messages { padding: 24px 20px 80px; }
  .input-container { padding: 20px 20px 32px; }
}
</style>
</head>
<body>
<div class="header">
  <div class="logo">PDF AI</div>
</div>
<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">📚 PDF Documents</div>
    </div>
    <div class="upload-area">
      <div class="upload-zone" id="uploadZone">
        <div class="upload-icon">📄</div>
        <div class="upload-text">Drop PDF here or click</div>
        <div class="upload-subtext">Supports all PDF formats</div>
        <input type="file" id="pdfFile" accept=".pdf" style="display: none;">
      </div>
      <div id="status" class="status"></div>
    </div>
  </div>

  <div class="chat-container">
    <div class="chat-messages" id="chatBox">
      <div class="message bot">
        <div class="avatar bot">AI</div>
        <div class="message-content">
          🌌 Welcome! Upload a PDF and ask anything about it. I'll analyze the content and answer instantly.
        </div>
      </div>
    </div>
    <div class="input-container">
      <div class="input-wrapper">
        <textarea id="question" class="chat-input" placeholder="Ask anything about your PDF..." rows="1"></textarea>
        <button id="sendBtn" class="send-btn" disabled><span class="send-icon">→</span></button>
      </div>
    </div>
  </div>
</div>

<script>
const API = "http://127.0.0.1:8000";
const chatBox = document.getElementById("chatBox");
const questionInput = document.getElementById("question");
const sendBtn = document.getElementById("sendBtn");
const pdfFileInput = document.getElementById("pdfFile");
const uploadZone = document.getElementById("uploadZone");
const statusEl = document.getElementById("status");

function addMessage(text, isUser = false) {
  const msg = document.createElement("div");
  msg.className = `message ${isUser ? 'user' : 'bot'}`;
  msg.innerHTML = `
    <div class="avatar ${isUser ? 'user' : 'bot'}">${isUser ? 'You' : 'AI'}</div>
    <div class="message-content">${text}</div>
  `;
  chatBox.appendChild(msg);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function showTyping() {
  const typing = document.createElement("div");
  typing.id = "typing";
  typing.className = "message bot typing-indicator";
  typing.innerHTML = `
    <div class="avatar bot">AI</div>
    <div class="typing-dots"><span></span><span></span><span></span></div>
  `;
  chatBox.appendChild(typing);
  chatBox.scrollTop = chatBox.scrollHeight;
  return typing;
}

async function uploadPDF(file) {
  const formData = new FormData();
  formData.append("file", file);
  statusEl.textContent = "🔄 Processing...";
  statusEl.className = "status";
  statusEl.style.display = "block";

  try {
    const res = await fetch(`${API}/upload-pdf`, { method: "POST", body: formData });
    const data = await res.json();

    if (res.ok) {
      statusEl.textContent = `✅ ${data.message}`;
      statusEl.className = "status success";
      addMessage("✅ PDF uploaded & indexed successfully!");
    } else {
      throw new Error(data.error || "Upload failed");
    }
  } catch (e) {
    statusEl.textContent = `❌ ${e.message}`;
    statusEl.className = "status error";
    console.error(e);
  }
}

async function sendQuestion() {
  const question = questionInput.value.trim();
  if (!question) return;

  addMessage(question, true);
  questionInput.value = "";
  sendBtn.disabled = true;
  const typing = showTyping();

  try {
    const res = await fetch(`${API}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question })
    });

    const data = await res.json();
    typing.remove();

    if (res.ok) {
      addMessage(data.answer);
    } else {
      addMessage(`Error: ${data.answer || "Server error"}`);
    }
  } catch (e) {
    typing.remove();
    addMessage(`Network error: ${e.message}`);
    console.error(e);
  } finally {
    sendBtn.disabled = false;
  }
}

// Event Listeners
questionInput.addEventListener("input", () => {
  sendBtn.disabled = !questionInput.value.trim();
  questionInput.style.height = "auto";
  questionInput.style.height = Math.min(questionInput.scrollHeight, 140) + "px";
});

questionInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendQuestion();
  }
});

sendBtn.addEventListener("click", sendQuestion);

uploadZone.addEventListener("click", () => pdfFileInput.click());
pdfFileInput.addEventListener("change", (e) => {
  if (e.target.files[0]) uploadPDF(e.target.files[0]);
});

// Drag & Drop
["dragover", "dragenter"].forEach(evt => {
  uploadZone.addEventListener(evt, (e) => {
    e.preventDefault();
    e.stopPropagation();
    uploadZone.classList.add("dragover");
  });
});

uploadZone.addEventListener("dragleave", () => uploadZone.classList.remove("dragover"));
uploadZone.addEventListener("drop", (e) => {
  e.preventDefault();
  uploadZone.classList.remove("dragover");
  const file = e.dataTransfer.files[0];
  if (file && file.type === "application/pdf") uploadPDF(file);
});
</script>
</body>
</html>
